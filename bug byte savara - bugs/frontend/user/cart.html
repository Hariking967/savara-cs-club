<!doctype html>
<html>
  <head>
    <link rel="stylesheet" href="../css/style.css" />
  </head>
  <body>
    <div class="content">
      <h2>Cart</h2>

      <div id="cartItems"></div>
      <a href="checkout.html">Checkout</a>
    </div>

    <script>
      const list = document.getElementById("cartItems");
      list.innerHTML = "";
      const cart = JSON.parse(localStorage.getItem("cartItems")) || [];
      if (cart.length == 0) {
        list.innerHTML += `
          <div class="product">
            <h4>No products found</h4>
          </div>
        `;
      } else {
        cart.forEach((i) => {
          list.innerHTML += `
          <div class="product">
            <h4>${i.name}  ₹${i.price + 50}</h4>
          </div>
        `;
        });
      }
    </script>
  </body>
</html>
